name: Ape-Demo Contract & Test CI
# 触发规则：仅修改Ape核心文件才执行，无关文件不触发
on:
  push:
    branches: [ main, dev ]
    paths:
      - "ape-config.yaml"
      - "contracts/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/ape-ci.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "ape-config.yaml"
      - "contracts/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/ape-ci.yml"

jobs:
  ape_verify:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取完整代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置Python3.11，缓存依赖加速
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. 安装Ape核心依赖 + 测试工具
      - name: Install Ape & Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Solidity合约编译校验（Ape内置编译）
      - name: Compile all contracts
        run: ape compile

      # 5. 全目录Python静态语法检查（scripts + tests）
      - name: Lint python code
        run: flake8 scripts/ tests/ --max-line-length=120

      # 6. 启动轻量Anvil本地链，用于部署冒烟+单元测试
      - name: Start Anvil local node
        run: |
          curl -L https://foundry.paradigm.xyz/install.sh | bash
          ~/.foundry/bin/foundryup
          ~/.foundry/bin/anvil --chain-id 31337 --port 8545 &
          sleep 5
        env:
          RPC_URL: http://127.0.0.1:8545

      # 7. 冒烟测试：执行合约部署脚本，验证部署流程无报错
      - name: Run deploy script smoke test
        run: ape run scripts/deploy --network ethereum:local

      # 8. 完整pytest单元测试（加载tests下全部用例、fixture、yaml测试数据）
      - name: Execute all pytest test cases
        run: python run_tests.py
        env:
          RPC_URL: http://127.0.0.1:8545

      # 9. 上传 Allure 测试报告
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: report/allure-report/
          retention-days: 30

      # 10. 兜底清理后台Anvil进程，避免CI资源残留
      - name: Clean up Anvil process
        if: always()
        run: pkill -f anvil || true