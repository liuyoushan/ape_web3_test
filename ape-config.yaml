name: ape-demo

plugins:
  - name: solidity
  - name: anvil
  - name: etherscan
  - name: alchemy

ethereum:
  default_network: local
  disable_automatic_node: true

  local:
    default_provider: test
    disable_automatic_node: true
    anvil:
      # 关键：告诉 ape 不要自己启动节点，只连接已有的节点
      # 不配置任何启动参数，让它无法自动启动
      no_start: true

test:
  mnemonic: "test test test test test test test test test test test junk"
  number_of_accounts: 20

compiler:
  solc:
    version: "0.8.20"
    optimizer:
      enabled: true
      runs: 1000000