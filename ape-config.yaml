# ==============================================================================
# 项目基本配置
# ==============================================================================
name: ape-demo          # 项目名称

# ==============================================================================
# 插件配置（企业级常用插件）
# ==============================================================================
plugins:
  - name: solidity      # Solidity 编译器插件
  - name: anvil         # 本地测试网节点（开发测试用）
  - name: etherscan     # Etherscan 验证插件（合约开源必备）
  - name: alchemy       # Alchemy 节点服务插件
  - name: ledger        # Ledger 硬件钱包集成（生产环境签名）

# ==============================================================================
# 以太坊网络配置（支持多链部署）
# ==============================================================================
ethereum:
  default_network: local  # 默认网络（本地开发测试用）
  
  # 本地网络配置
  local:
    anvil:
      balance: 10000 ether  # 每个测试账户初始分配 10000 ETH
  
  # 主网分叉配置（在真实链状态下测试）
  mainnet-fork:
    anvil:
      fork_url: "https://eth-mainnet.g.alchemy.com/v2/${ALCHEMY_MAINNET_API_KEY}"  # 通过环境变量注入
  
  # # 主网配置
  # mainnet:
  #   alchemy:
  #     api_key: ${ALCHEMY_MAINNET_API_KEY}  # 用你已有的环境变量名称
  
  # Goerli 测试网配置（以太坊官方测试网）
  goerli:
    alchemy:
      api_key: ${ALCHEMY_GOERLI_API_KEY}
  
  # Polygon 网络配置（L2 扩容方案）
  polygon:
    alchemy:
      api_key: ${ALCHEMY_POLYGON_API_KEY}

# ==============================================================================
# 测试配置（企业级质量保障）
# ==============================================================================
test:
  mnemonic: "test test test test test test test test test test test junk"  # 测试账户助记词（Anvil 默认，安全无害）
  number_of_accounts: 20          # 测试账户数量（支持复杂场景测试）
  
  # 主网分叉配置（在真实链状态下测试）
  fork:
    mainnet:
      block_number: 18000000      # 固定区块号，确保测试可复现
      enabled: true               # 启用主网分叉

# ==============================================================================
# 账户管理（企业级安全方案）
# ==============================================================================
accounts:
  auto_sign: true                 # 测试环境自动签名（提高测试效率）
  ledger:
    account_path: "m/44'/60'/0'/0/0"  # Ledger 硬件钱包路径（生产环境使用）

# ==============================================================================
# 部署记录（记录各网络合约地址）
# ==============================================================================
# deployments:
#   mainnet:                        # 主网部署地址
#     MyERC20: "0x1234567890abcdef1234567890abcdef12345678"
#     MiniSwapFactory: "0xabcdef1234567890abcdef1234567890abcdef12"
#   goerli:                         # Goerli 测试网部署地址
#     MyERC20: "0x9876543210fedcba9876543210fedcba98765432"

# ==============================================================================
# 日志配置（企业级监控）
# ==============================================================================
logging:
  level: INFO                     # 日志级别：DEBUG/INFO/WARN/ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"  # 日志格式

# ==============================================================================
# 编译器配置（优化与版本控制）
# ==============================================================================
compiler:
  solc:
    version: "0.8.20"             # 指定 Solidity 版本（团队统一）
    optimizer:
      enabled: true               # 启用优化器（减少 Gas 成本）
      runs: 1000000              # 优化目标：高频调用场景（100万次）

# ==============================================================================
# 依赖管理（企业级第三方库）
# ==============================================================================
dependencies:
  - name: openzeppelin            # OpenZeppelin 安全合约库
    github: OpenZeppelin/openzeppelin-contracts
    version: "4.9.0"              # 锁定版本，避免意外更新
