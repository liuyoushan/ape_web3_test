version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.listen-address=0.0.0.0:9090'

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  chain-exporter:
    image: python:3.10-slim
    container_name: chain-exporter
    ports:
      - "9100:9100"
    volumes:
      - ./chain_exporter.py:/app/chain_exporter.py
      - ../broadcast:/home/liuyoushan/ape-demo/perf/broadcast
    working_dir: /app
    command: >
      bash -c "pip install flask && python chain_exporter.py"

networks:
  default:
    name: monitoring-network
