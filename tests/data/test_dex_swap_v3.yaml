# Uniswap V3 测试数据配置

# case_055: 集中流动性添加测试
case_055_concentrated_liquidity_add:
  mint_amount: "1000"
  add_liquidity_full_range: "100"
  add_liquidity_narrow_range: "50"
  fee_tier: 3000
  tick_range_full:
    min_tick: -887272
    max_tick: 887272
  tick_range_narrow:
    min_tick: -600
    max_tick: 600

# 费率层级配置
fee_tiers:
  tier_0_01: 100    # 0.01%
  tier_0_05: 500    # 0.05%
  tier_0_3: 3000    # 0.3%
  tier_1: 10000     # 1%

# Tick 区间配置
tick_ranges:
  default_min_tick: -887272
  default_max_tick: 887272
  small_range_min: -60
  small_range_max: 60
  medium_range_min: -300
  medium_range_max: 300

# 流动性测试配置
liquidity_test:
  initial_amount_a: 100000000000000000000  # 100 TokenA
  initial_amount_b: 100000000000000000000  # 100 TokenB
  add_liquidity_amount: 10000000000000000000  # 10 Token

# Swap 测试配置
swap_test:
  swap_amount: 1000000000000000000  # 1 Token
  slippage_tolerance: 0.005  # 0.5%

# 手续费测试配置
fee_test:
  protocol_fee_ratio: 0.25  # 协议费抽成 25%

# TWAP 测试配置
twap_test:
  twap_period: 3600  # 1小时
  twap_observations: 60